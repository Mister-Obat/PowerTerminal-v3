<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerTerminal</title>
    <link rel="stylesheet" href="./src/renderer/style/main.css">
</head>
<body>
    <div id="titlebar" class="titlebar">
        <div class="drag-handle">PowerTerminal</div>
        <div class="window-controls">
            <button id="win-min" class="win-btn">－</button>
            <button id="win-max" class="win-btn">▢</button>
            <button id="win-close" class="win-btn danger">×</button>
        </div>
    </div>
    <div id="app">
        <!-- Selection View -->
        <section id="selection-view" class="view">
            <header>
                <h1>PowerTerminal</h1>
                <p>Ouvrez un projet pour commencer</p>
                <button id="donate-btn" class="btn-donate">♥ Faire un don</button>
            </header>
            <div id="favorites-list" class="project-list favorites">
                <!-- Favorites go here -->
            </div>
            <div class="divider">Projets</div>
            <div id="project-list" class="project-list">
                <!-- Dynamically populated list -->
            </div>
            <div class="selection-footer">
                <button id="add-project-btn" class="btn-add-project">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Ajouter un projet
                </button>
            </div>
        </section>

        <!-- Edit Project Modal -->
        <div id="edit-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Personnaliser le projet</h2>
                <div class="modal-logo-picker" id="modal-logo-picker" title="Changer le logo">
                    <img id="modal-logo-img" class="hidden">
                    <div id="modal-logo-placeholder"></div>
                    <div class="modal-logo-overlay">📷</div>
                </div>
                <div class="form-group">
                    <label>Nom affiché</label>
                    <input type="text" id="edit-display-name">
                </div>
                <div class="form-group">
                    <label>Dossier racine (Terminal)</label>
                    <input type="text" id="edit-root-path">
                </div>
                <div class="modal-actions">
                    <button id="modal-cancel">Annuler</button>
                    <button id="modal-save">Enregistrer</button>
                </div>
            </div>
        </div>

        <!-- Edit Command Modal -->
        <div id="command-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="cmd-modal-title">Nouvelle commande</h2>
                <div class="form-row">
                    <div class="form-group emoji-group" style="position: relative;">
                        <label>Emoji</label>
                        <input type="text" id="cmd-emoji" placeholder="🚀" readonly style="cursor: pointer;">
                        <div id="emoji-picker" class="emoji-picker hidden"></div>
                    </div>
                    <div class="form-group name-group">
                        <label>Nom</label>
                        <input type="text" id="cmd-name" placeholder="Nom de l'action">
                    </div>
                </div>
                <div class="form-group">
                    <label>Commande réelle</label>
                    <input type="text" id="cmd-raw" placeholder="pnpm run dev, git push, etc.">
                </div>
                <div class="modal-actions">
                    <button id="cmd-cancel">Annuler</button>
                    <button id="cmd-save">Ajouter</button>
                </div>
            </div>
        </div>

        <!-- Delete Confirmation Modal -->
        <div id="delete-confirm-modal" class="modal hidden">
            <div class="modal-content">
                <h2>Supprimer la commande ?</h2>
                <p>Cette action est irréversible. Voulez-vous vraiment supprimer cette commande ?</p>
                <div class="modal-actions">
                    <button id="delete-cancel" class="btn-secondary">Annuler</button>
                    <button id="delete-confirm" class="btn-danger">Supprimer</button>
                </div>
            </div>
        </div>
        <section id="dashboard-view" class="view hidden">
            <!-- Col 1: Project Identity & Nav -->
            <aside class="col-left">
                <button id="back-to-selection" class="btn-back" title="Retour à la sélection">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 5l-7 7 7 7"/>
                    </svg>
                </button>

                <div id="sidebar-favorites" class="sidebar-favorites"></div>

                <div class="sidebar-footer">
                    <button id="add-custom-command" class="btn-add-cmd" title="Ajouter une commande">+</button>
                </div>
            </aside>

            <!-- Zone centrale : commandes + resizer horizontal + shell (en mode vertical) -->
            <div class="col-center">
                <!-- Col 2: Enhanced Commands -->
                <main class="col-mid">
                    <div id="command-grid" class="command-grid-vertical">
                        <!-- Cards: Emoji / Name / Desc / Real Command -->
                    </div>
                </main>

                <!-- Resizer vertical (mode horizontal) -->
                <div id="panel-resizer" class="panel-resizer"></div>

                <!-- Resizer horizontal (mode vertical) -->
                <div id="panel-resizer-h" class="panel-resizer-h"></div>

                <!-- Col 3: Multi-Terminal -->
                <section class="col-right">
                    <div id="terminal-section">
                        <div id="terminal-tabs" class="tabs-bar">
                            <div id="tabs-container"></div>
                            <button id="add-terminal" title="Nouvel onglet">+</button>
                            <button id="remove-terminal" title="Fermer l'onglet actif">－</button>
                        </div>
                        <div id="terminal-wrapper">
                            <!-- Terminal instances -->
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </div>
    <script type="module" src="./src/renderer/js/app.js"></script>
</body>
</html>
